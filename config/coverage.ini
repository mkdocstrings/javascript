[coverage:paths]
source =
  src/mkdocstrings_javascript
  */site-packages/mkdocstrings_javascript

[coverage:run]
branch = true
source =
  src/mkdocstrings_javascript
  tests
parallel = true

[coverage:report]
precision = 2
omit =
  src/mkdocstrings_javascript/__init__.py
  src/mkdocstrings_javascript/__main__.py
  tests/*

[coverage:html]
directory = build/coverage

[coverage:json]
output = build/coverage.json
